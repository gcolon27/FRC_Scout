<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC 2026 Scout (Navy & Gold)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Base Background and Text */
        body, html {
            background-color: #000000 !important; /* Deep black background */
            color: #ffffff !important; /* Force white text everywhere */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
        }

        /* All Headers in Gold */
        h1, h2, h3, h4, h5, h6 {
            color: #FFD700 !important; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Target all container sections (Navy Blue with Gold Borders) */
        .section {
            background-color: #0A192F !important; /* Deep Navy Blue */
            border: 2px solid #FFD700 !important; /* Gold Border */
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.15);
        }

        /* Labels and small text */
        label, span, p {
            font-weight: bold;
            color: #FFD700 !important; /* Gold labels */
            display: block;
            margin-bottom: 5px;
        }

        /* Inputs, Textareas, and Dropdowns */
        input[type="number"], input[type="text"], textarea, select {
            width: 100%;
            background-color: #001F3F !important; /* Lighter Navy for inputs */
            color: #ffffff !important; /* White typing text */
            border: 1px solid #FFD700 !important;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            box-shadow: 0 0 8px #FFD700;
            background-color: #0A192F !important;
        }

        /* Button Groups */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        /* All Buttons (Default: Navy with Gold Text) */
        button, .toggle-btn, .counter-btn {
            background-color: #001F3F !important; 
            color: #FFD700 !important; 
            border: 2px solid #FFD700 !important; 
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        /* Hover effect for buttons */
        button:hover, .toggle-btn:hover, .counter-btn:hover {
            background-color: #FFD700 !important; /* Flips to Gold Background */
            color: #000000 !important; /* Flips to Black Text */
        }

        /* Active/Toggled State for your custom toggle buttons */
        .active {
            background-color: #FFD700 !important;
            color: #000000 !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Plus/Minus Counter UI */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .counter-btn {
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: none;
            padding: 0;
        }
        .counter-display {
            font-size: 1.8rem;
            font-weight: bold;
            width: 40px;
            text-align: center;
            color: #ffffff !important;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            font-size: 1.2rem;
        }
        .btn-submit {
            background-color: #FFD700 !important;
            color: #000000 !important;
        }
        .btn-submit:hover {
            background-color: #ffffff !important;
        }
        .btn-reset {
            border-color: #ff3333 !important;
            color: #ff3333 !important;
        }
        .btn-reset:hover {
            background-color: #ff3333 !important;
            color: #ffffff !important;
        }

        /* Modal / QR Code Display Overlay */
        #qrModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9) !important;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: #0A192F !important;
            border: 3px solid #FFD700 !important;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* CRITICAL: QR codes MUST have white backgrounds or scanners will fail */
        #qrcode {
            background-color: #ffffff !important; 
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>FRC Scouting</h1>

    <div class="section">
        <label>Scout Name:</label>
        <input type="text" id="scoutName" placeholder="e.g. John D.">
        
        <label>Match Number:</label>
        <input type="number" id="match" placeholder="1-150">
        
        <label>Team Number:</label>
        <input type="number" id="team" placeholder="e.g. 254">
    </div>

    <div class="section">
        <h2>Autonomous</h2>
        <label style="text-align: center;">Auto Balls Scored</label>
        <div class="counter-container">
            <button class="counter-btn" onclick="updateCounter('auto', -1)">-</button>
            <span class="counter-display" id="autoDisp">0</span>
            <button class="counter-btn" onclick="updateCounter('auto', 1)">+</button>
        </div>

        <label>Auto Climb Level</label>
        <div class="btn-group" id="autoClimbGroup">
            <button class="toggle-btn active" onclick="setGroupVal('autoClimbGroup', 'None', 'autoClimb')">None</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L1', 'autoClimb')">L1</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L2', 'autoClimb')">L2</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L3', 'autoClimb')">L3</button>
        </div>
    </div>

    <div class="section">
        <h2>Teleop & Endgame</h2>
        <label style="text-align: center;">Teleop Balls Scored</label>
        <div class="counter-container">
            <button class="counter-btn" onclick="updateCounter('tele', -1)">-</button>
            <span class="counter-display" id="teleDisp">0</span>
            <button class="counter-btn" onclick="updateCounter('tele', 1)">+</button>
        </div>

        <label>Endgame Climb Level</label>
        <div class="btn-group" id="endClimbGroup">
            <button class="toggle-btn active" onclick="setGroupVal('endClimbGroup', 'None', 'endClimb')">None</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L1', 'endClimb')">L1</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L2', 'endClimb')">L2</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L3', 'endClimb')">L3</button>
        </div>
    </div>

    <div class="section">
        <h2>Post-Match</h2>
        <div class="btn-group" id="outcomeGroup">
            <button class="toggle-btn active" onclick="setGroupVal('outcomeGroup', 'None', 'outcome')">None</button>
            <button class="toggle-btn" onclick="setGroupVal('outcomeGroup', 'Win', 'outcome')">Win</button>
            <button class="toggle-btn" onclick="setGroupVal('outcomeGroup', 'Loss', 'outcome')">Loss</button>
            <button class="toggle-btn" onclick="setGroupVal('outcomeGroup', 'Tie', 'outcome')">Tie</button>
        </div>

        <div class="btn-group">
            <button class="toggle-btn" id="btnDefense" onclick="toggleBool('defense', 'btnDefense')">Played Defense</button>
            <button class="toggle-btn" id="btnBroke" onclick="toggleBool('broke', 'btnBroke')">Robot Broke</button>
        </div>

        <label>Notes (Keep it brief):</label>
        <textarea id="notes" rows="3" maxlength="100" oninput="document.getElementById('charCount').innerText = this.value.length + ' / 100'"></textarea>
        <div style="text-align: right; color: #FFD700; font-size: 0.9rem;" id="charCount">0 / 100</div>
    </div>

    <button class="action-btn btn-submit" onclick="generateQR()">📷 Generate QR Code</button>
    <button class="action-btn btn-reset" onclick="resetForm()">🗑️ Reset Data</button>

    <div id="qrModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Scan Me</h2>
            <div id="qrcode"></div>
            <button class="action-btn btn-submit" style="margin-top: 20px;" onclick="document.getElementById('qrModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        // State storage
        let data = { auto: 0, tele: 0, autoClimb: 'None', endClimb: 'None', outcome: 'None', defense: false, broke: false };

        function updateCounter(type, change) {
            data[type] += change;
            if (data[type] < 0) data[type] = 0; // Prevent negative scores
            document.getElementById(type + 'Disp').innerText = data[type];
        }

        function setGroupVal(groupId, value, stateKey) {
            data[stateKey] = value;
            let btns = document.getElementById(groupId).children;
            for (let b of btns) b.classList.remove('active');
            event.target.classList.add('active');
        }

        function toggleBool(stateKey, btnId) {
            data[stateKey] = !data[stateKey];
            let btn = document.getElementById(btnId);
            if (data[stateKey]) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function generateQR() {
            let match = document.getElementById('match').value;
            let team = document.getElementById('team').value;
            let scout = document.getElementById('scoutName').value;

            if (!match || !team) {
                alert("Please enter both Match and Team numbers!");
                return;
            }

            // Map data to the ultra-short JSON format your server expects
            let payload = {
                m: parseInt(match),
                t: parseInt(team),
                s: scout,
                ab: data.auto,
                ac: data.autoClimb,
                tb: data.tele,
                ec: data.endClimb,
                o: data.outcome,
                df: data.defense ? 1 : 0,
                br: data.broke ? 1 : 0,
                n: document.getElementById('notes').value
            };

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: JSON.stringify(payload),
                width: 250, 
                height: 250,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });
            document.getElementById('qrModal').style.display = 'flex';
        }

        function resetForm() {
            if(!confirm("Clear data? (Scout name will stay)")) return;
            
            // Clear text inputs
            document.getElementById('match').value = '';
            document.getElementById('team').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('charCount').innerText = '0 / 100';
            
            // Reset state
            data = { auto: 0, tele: 0, autoClimb: 'None', endClimb: 'None', outcome: 'None', defense: false, broke: false };
            
            // Reset UI counters
            document.getElementById('autoDisp').innerText = '0';
            document.getElementById('teleDisp').innerText = '0';
            
            // Reset buttons
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            ['autoClimbGroup', 'endClimbGroup', 'outcomeGroup'].forEach(id => {
                document.getElementById(id).children[0].classList.add('active'); // Set 'None' to active
            });
        }
    </script>
</body>
</html>
