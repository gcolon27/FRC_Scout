<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Scout Client</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Catppuccin Mocha Palette */
        :root {
            --base: #1e1e2e;
            --mantle: #181825;
            --crust: #11111b;
            --text: #cdd6f4;
            --subtext0: #a6adc8;
            --surface0: #313244;
            --blue: #89b4fa;
            --yellow: #f9e2af;
            --red: #f38ba8;
            --green: #a6e3a1;
        }

        body, html {
            background-color: var(--base) !important;
            color: var(--text) !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
        }

        h1, h2, h3, h4 {
            color: var(--blue) !important; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .section {
            background-color: var(--mantle) !important;
            border: 2px solid var(--surface0) !important;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        label, span, p {
            font-weight: bold;
            color: var(--blue) !important;
            display: block;
            margin-bottom: 5px;
        }

        input[type="number"], input[type="text"], textarea, select {
            width: 100%;
            background-color: var(--surface0) !important;
            color: var(--text) !important;
            border: 1px solid var(--subtext0) !important;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--blue) !important;
            box-shadow: 0 0 5px var(--blue);
            background-color: var(--mantle) !important;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button, .toggle-btn, .counter-btn {
            background-color: var(--surface0) !important; 
            color: var(--blue) !important; 
            border: 2px solid var(--blue) !important; 
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease-in-out;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        button:hover, .toggle-btn:hover, .counter-btn:hover {
            background-color: var(--blue) !important;
            color: var(--base) !important;
        }

        .active {
            background-color: var(--blue) !important;
            color: var(--base) !important;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        /* Specialized Counter UI */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .counter-btn {
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: none;
            padding: 0;
        }
        .counter-input {
            width: 80px !important;
            text-align: center;
            font-size: 1.5rem !important;
            font-weight: bold;
            margin-bottom: 0 !important;
            padding: 8px !important;
            -moz-appearance: textfield;
        }
        .counter-input::-webkit-outer-spin-button,
        .counter-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .action-btn {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            font-size: 1.2rem;
        }
        .btn-submit {
            background-color: var(--yellow) !important;
            color: var(--base) !important;
            border-color: var(--yellow) !important;
        }
        .btn-submit:hover {
            background-color: var(--text) !important;
            border-color: var(--text) !important;
        }
        .btn-reset {
            background-color: transparent !important;
            border-color: var(--red) !important;
            color: var(--red) !important;
        }
        .btn-reset:hover {
            background-color: var(--red) !important;
            color: var(--base) !important;
        }

        #qrModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 17, 27, 0.9) !important;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: var(--mantle) !important;
            border: 3px solid var(--blue) !important;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #qrcode {
            background-color: #ffffff !important; 
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>FRC Scout Client</h1>

    <div class="section">
        <label>Scout Name:</label>
        <input type="text" id="scoutName" placeholder="e.g. John D.">
        
        <label>Match Number:</label>
        <input type="number" id="match" placeholder="1-150">
        
        <label>Team Number:</label>
        <input type="number" id="team" placeholder="e.g. 254">
    </div>

    <div class="section">
        <h2>Autonomous</h2>
        <label style="text-align: center;">Auto Balls Scored</label>
        <div class="counter-container">
            <button class="counter-btn" onclick="updateCounter('auto', -1)">-</button>
            <input type="number" class="counter-input" id="autoDisp" value="0" min="0" oninput="manualUpdate('auto', this.value)">
            <button class="counter-btn" onclick="updateCounter('auto', 1)">+</button>
        </div>

        <label>Auto Climb Level</label>
        <div class="btn-group" id="autoClimbGroup">
            <button class="toggle-btn active" onclick="setGroupVal('autoClimbGroup', 'None', 'autoClimb')">None</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L1', 'autoClimb')">L1</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L2', 'autoClimb')">L2</button>
            <button class="toggle-btn" onclick="setGroupVal('autoClimbGroup', 'L3', 'autoClimb')">L3</button>
        </div>
    </div>

    <div class="section">
        <h2>Teleop & Endgame</h2>
        <label style="text-align: center;">Teleop Balls Scored</label>
        <div class="counter-container">
            <button class="counter-btn" onclick="updateCounter('tele', -1)">-</button>
            <input type="number" class="counter-input" id="teleDisp" value="0" min="0" oninput="manualUpdate('tele', this.value)">
            <button class="counter-btn" onclick="updateCounter('tele', 1)">+</button>
        </div>

        <label>Endgame Climb Level</label>
        <div class="btn-group" id="endClimbGroup">
            <button class="toggle-btn active" onclick="setGroupVal('endClimbGroup', 'None', 'endClimb')">None</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L1', 'endClimb')">L1</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L2', 'endClimb')">L2</button>
            <button class="toggle-btn" onclick="setGroupVal('endClimbGroup', 'L3', 'endClimb')">L3</button>
        </div>
    </div>

    <div class="section">
        <h2>Post-Match</h2>
        <label>Match Outcome</label>
        <div class="btn-group" id="outcomeGroup">
            <button class="toggle-btn active" onclick="setGroupVal('outcomeGroup', 'Tie', 'outcome')">Tie</button>
            <button class="toggle-btn" onclick="setGroupVal('outcomeGroup', 'Win', 'outcome')">Win</button>
            <button class="toggle-btn" onclick="setGroupVal('outcomeGroup', 'Loss', 'outcome')">Loss</button>
        </div>

        <div class="btn-group">
            <button class="toggle-btn" id="btnDefense" onclick="toggleBool('defense', 'btnDefense')">Played Defense</button>
            <button class="toggle-btn" id="btnBroke" onclick="toggleBool('broke', 'btnBroke')">Robot Broke</button>
        </div>

        <label>Notes (Keep it brief):</label>
        <textarea id="notes" rows="3" maxlength="100" oninput="document.getElementById('charCount').innerText = this.value.length + ' / 100'"></textarea>
        <div style="text-align: right; color: var(--subtext0); font-size: 0.9rem;" id="charCount">0 / 100</div>
    </div>

    <button class="action-btn btn-submit" onclick="generateQR()">📷 Generate QR Code</button>
    <button class="action-btn btn-reset" onclick="resetForm()">🗑️ Reset Data</button>

    <div id="qrModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--yellow) !important;">Scan Me</h2>
            <div id="qrcode"></div>
            <button class="action-btn btn-submit" style="margin-top: 20px;" onclick="document.getElementById('qrModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        // ==========================================
        // DEVICE ID (CHANGE THIS FOR EACH TABLET)
        // ==========================================
        const DEVICE_ID = "Unassigned"; 
        
        let data = { auto: 0, tele: 0, autoClimb: 'None', endClimb: 'None', outcome: 'Tie', defense: false, broke: false };

        function updateCounter(type, change) {
            data[type] += change;
            if (data[type] < 0) data[type] = 0; 
            document.getElementById(type + 'Disp').value = data[type];
        }

        function manualUpdate(type, value) {
            let parsed = parseInt(value);
            if (isNaN(parsed) || parsed < 0) parsed = 0;
            data[type] = parsed;
        }

        function setGroupVal(groupId, value, stateKey) {
            data[stateKey] = value;
            let btns = document.getElementById(groupId).children;
            for (let b of btns) b.classList.remove('active');
            event.target.classList.add('active');
        }

        function toggleBool(stateKey, btnId) {
            data[stateKey] = !data[stateKey];
            let btn = document.getElementById(btnId);
            if (data[stateKey]) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function generateQR() {
            let match = document.getElementById('match').value;
            let team = document.getElementById('team').value;
            let scout = document.getElementById('scoutName').value;

            if (!match || !team) {
                alert("Please enter both Match and Team numbers!");
                return;
            }

            let payload = {
                dev: DEVICE_ID, // <-- Hidden Device ID sent to server
                m: parseInt(match),
                t: parseInt(team),
                s: scout,
                ab: data.auto,
                ac: data.autoClimb,
                tb: data.tele,
                ec: data.endClimb,
                o: data.outcome,
                df: data.defense ? 1 : 0,
                br: data.broke ? 1 : 0,
                n: document.getElementById('notes').value
            };

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: JSON.stringify(payload),
                width: 250, 
                height: 250,
                colorDark : "#1e1e2e", 
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });
            document.getElementById('qrModal').style.display = 'flex';
        }

        function resetForm() {
            if(!confirm("Clear data? (Scout name will stay)")) return;
            
            document.getElementById('match').value = '';
            document.getElementById('team').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('charCount').innerText = '0 / 100';
            
            data = { auto: 0, tele: 0, autoClimb: 'None', endClimb: 'None', outcome: 'Tie', defense: false, broke: false };
            
            document.getElementById('autoDisp').value = '0';
            document.getElementById('teleDisp').value = '0';
            
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            ['autoClimbGroup', 'endClimbGroup', 'outcomeGroup'].forEach(id => {
                document.getElementById(id).children[0].classList.add('active'); 
            });
        }
    </script>
</body>
</html>
